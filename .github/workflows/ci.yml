name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        working-directory: ./resume_screener_backend
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pymongo python-dotenv pydantic python-jose[cryptography] passlib[bcrypt] bcrypt pytest httpx
      - name: Run Pytest
        working-directory: ./resume_screener_backend
        run: |
          pytest tests/test_auth.py -v

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: ./resume_screener_frontend/resume_screener_frontend
        run: npm ci
      - name: Run React Tests
        working-directory: ./resume_screener_frontend/resume_screener_frontend
        run: npm test
